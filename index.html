<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8"/>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;
    background:radial-gradient(ellipse at 60% 20%,#1a0a3a 0%,#060418 50%,#07041a 100%);
    font-family:'Amiri',Georgia,serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px 16px;overflow-x:hidden;position:relative;
  }
  @keyframes twinkle{0%,100%{opacity:0}50%{opacity:.9}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes shimmer{0%{background-position:-300% center}100%{background-position:300% center}}
  @keyframes pulseGlow{
    0%,100%{box-shadow:0 0 30px rgba(218,165,32,.15),0 20px 80px rgba(0,0,0,.5)}
    50%{box-shadow:0 0 60px rgba(218,165,32,.35),0 20px 80px rgba(0,0,0,.5)}
  }
  @keyframes revealUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .stars-container{position:fixed;inset:0;pointer-events:none;z-index:0}
  .star{position:absolute;border-radius:50%;background:#fff;opacity:0}
  .card{
    position:relative;z-index:1;width:100%;max-width:500px;
    background:rgba(8,5,26,.92);backdrop-filter:blur(20px);
    border:1px solid rgba(218,165,32,.25);border-radius:28px;
    padding:40px 28px 36px;animation:pulseGlow 4s ease-in-out infinite;
  }
  .card::before{content:'';position:absolute;top:0;left:25%;right:25%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(218,165,32,.7),transparent);}
  .moon{animation:float 4s ease-in-out infinite;display:inline-block;margin-bottom:14px}
  .title{
    font-size:30px;font-weight:700;letter-spacing:3px;
    background:linear-gradient(90deg,#b8860b,#ffd54f,#fffde7,#ffd54f,#b8860b);
    background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    animation:shimmer 5s linear infinite;margin-bottom:6px;
  }
  .subtitle{color:rgba(255,255,255,.35);font-size:12px;font-family:sans-serif;letter-spacing:1px}
  .input-row{
    display:flex;gap:8px;align-items:stretch;background:rgba(255,255,255,.04);
    border:1.5px solid rgba(218,165,32,.3);border-radius:14px;overflow:hidden;padding:4px;margin-bottom:8px;
  }
  .input-row input{flex:1;padding:12px 16px;font-size:22px;text-align:center;
    background:transparent;border:none;color:#fff;font-family:'Amiri',serif;direction:ltr;}
  .input-row input:focus{outline:none}
  .input-row input::placeholder{color:rgba(255,255,255,.25);font-size:16px;direction:rtl}

  .error{color:#ff6b6b;font-size:13px;text-align:center;font-family:sans-serif;margin-top:4px;min-height:20px}
  .toggle-row{display:flex;align-items:center;justify-content:center;gap:10px;
    margin-top:8px;padding:10px 14px;border-radius:12px;cursor:pointer;
    background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
    transition:all .2s;user-select:none;}
  .toggle-row:hover{background:rgba(100,181,246,.08);border-color:rgba(100,181,246,.25);}
  .toggle-row.active{background:rgba(100,181,246,.12);border-color:rgba(100,181,246,.4);}
  .toggle-check{width:18px;height:18px;border-radius:5px;border:1.5px solid rgba(100,181,246,.5);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
  .toggle-row.active .toggle-check{background:#64b5f6;border-color:#64b5f6;}
  .toggle-check svg{display:none;}
  .toggle-row.active .toggle-check svg{display:block;}
  .toggle-label{color:rgba(255,255,255,.55);font-size:13px;font-family:sans-serif;}
  .toggle-row.active .toggle-label{color:rgba(100,181,246,.9);}

  .loading{display:flex;align-items:center;justify-content:center;gap:10px;
    color:rgba(218,165,32,.7);font-size:14px;font-family:sans-serif;padding:20px;}
  .spinner{width:22px;height:22px;border:2px solid rgba(218,165,32,.2);
    border-top-color:#daa520;border-radius:50%;animation:spin .8s linear infinite;}
  .result{animation:revealUp .6s cubic-bezier(.22,1,.36,1)}
  .hero-box{
    background:linear-gradient(135deg,rgba(218,165,32,.14),rgba(218,165,32,.04));
    border:1px solid rgba(218,165,32,.3);border-radius:18px;
    padding:22px 16px;margin-bottom:12px;text-align:center;
    box-shadow:inset 0 1px 0 rgba(218,165,32,.12);
  }
  .hero-label{color:rgba(255,255,255,.4);font-size:11px;font-family:sans-serif;margin-bottom:8px;letter-spacing:1px}
  .hero-num{font-size:64px;font-weight:700;line-height:1;
    background:linear-gradient(180deg,#fff9c4,#ffd54f,#daa520);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .hero-sub{color:rgba(218,165,32,.7);font-size:14px;margin:4px 0 18px}
  .dates-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;
    background:rgba(0,0,0,.35);border-radius:12px;padding:14px 12px;border:1px solid rgba(218,165,32,.12);}
  .date-col{text-align:center}
  .date-col .dlabel{color:rgba(255,255,255,.35);font-size:10px;font-family:sans-serif;margin-bottom:4px}
  .date-col .dname{color:#fff;font-size:15px;font-weight:700}
  .date-col .dname.gold{color:#ffd54f}
  .date-col .dfmt{color:#c8a85a;font-size:12px;margin-top:3px}
  .date-col .dhijri{color:rgba(255,255,255,.25);font-size:10px;margin-top:2px;font-family:sans-serif}
  @keyframes warnBlink{
    0%,100%{color:#ff4444;text-shadow:0 0 10px rgba(255,68,68,.9);}
    50%{color:#ffd54f;text-shadow:0 0 10px rgba(255,213,79,.9);}
  }
  .dfmt.approx,.dname.approx{animation:warnBlink 1.1s ease-in-out infinite;font-weight:700;}
  @keyframes ramBlink{
    0%,100%{background:rgba(255,68,68,.3);color:#ff8a80;text-shadow:0 0 8px rgba(255,68,68,.7);}
    50%{background:rgba(255,213,79,.25);color:#ffd54f;text-shadow:0 0 8px rgba(255,213,79,.7);}
  }

  .source-card{

  .tag-book{background:rgba(100,181,246,.15);color:#90caf9;border:1px solid rgba(100,181,246,.3);}

<script>
const sc=document.getElementById('stars');
for(let i=0;i<65;i++){
  const s=document.createElement('div');s.className='star';
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${Math.random()*2+.5}px;height:${Math.random()*2+.5}px;animation:twinkle ${2+Math.random()*3}s ${Math.random()*5}s infinite`;
  sc.appendChild(s);
}

const GM=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const GD=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const EN2AR={Sunday:'الأحد',Monday:'الاثنين',Tuesday:'الثلاثاء',
  Wednesday:'الأربعاء',Thursday:'الخميس',Friday:'الجمعة',Saturday:'السبت'};

const PATTERN=[25,21,23,25,29,25,27,23];
const API_MIN=1356, API_MAX=1500; // هجري

// جدول الكتاب (1430-1501هـ)
const BOOK={
  1430:[25,15,9,2009],  1431:[21,31,8,2010],  1432:[23,23,8,2011],
  1433:[25,14,8,2012],  1434:[29,6,8,2013],   1435:[25,22,7,2014],
  1436:[27,14,7,2015],  1437:[23,28,6,2016],  1438:[25,20,6,2017],
  1439:[21,5,6,2018],   1440:[23,28,5,2019],  1441:[25,19,5,2020],
  1442:[29,11,5,2021],  1443:[25,26,4,2022],  1444:[27,18,4,2023],
  1445:[23,2,4,2024],   1446:[25,25,3,2025],  1447:[21,10,3,2026],
  1448:[23,2,3,2027],   1449:[25,22,2,2028],  1450:[29,13,2,2029],
  1451:[25,29,1,2030],  1452:[27,21,1,2031],  1453:[23,6,1,2032],
  1454:[25,28,12,2032], 1455:[21,13,12,2033], 1456:[23,5,12,2034],
  1457:[25,27,11,2035], 1458:[29,18,11,2036], 1459:[25,3,11,2037],
  1460:[27,26,10,2038], 1461:[23,11,10,2039], 1462:[25,2,10,2040],
  1463:[21,17,9,2041],  1464:[23,9,9,2042],   1465:[25,1,9,2043],
  1466:[29,23,8,2044],  1467:[25,8,8,2045],   1468:[27,31,7,2046],
  1469:[23,16,7,2047],  1470:[25,7,7,2048],   1471:[21,22,6,2049],
  1472:[23,14,6,2050],  1473:[25,6,6,2051],   1474:[29,28,5,2052],
  1475:[25,13,5,2053],  1476:[27,5,5,2054],   1477:[23,20,4,2055],
  1478:[25,11,4,2056],  1479:[21,27,3,2057],  1480:[23,19,3,2058],
  1481:[25,11,3,2059],  1482:[29,2,3,2060],   1483:[25,15,2,2061],
  1484:[27,7,2,2062],   1485:[23,23,1,2063],  1486:[25,15,1,2064],
  1487:[21,30,12,2064], 1488:[23,22,12,2065], 1489:[25,14,12,2066],
  1490:[29,6,12,2067],  1491:[25,20,11,2068], 1492:[27,12,11,2069],
  1493:[23,28,10,2070], 1494:[25,20,10,2071], 1495:[21,4,10,2072],
  1496:[23,26,9,2073],  1497:[25,18,9,2074],  1498:[29,10,9,2075],
  1499:[25,25,8,2076],  1500:[27,17,8,2077],  1501:[23,2,8,2078],
};

function h2g(hY,hM,hD){
  const jd=Math.floor((11*hY+3)/30)+354*hY+30*hM-Math.floor((hM-1)/2)+hD+1948440-385;
  let l=jd+68569,n=Math.floor(4*l/146097);
  l=l-Math.floor((146097*n+3)/4);
  let ii=Math.floor(4000*(l+1)/1461001);
  l=l-Math.floor(1461*ii/4)+31;
  let j=Math.floor(80*l/2447);
  const d=l-Math.floor(2447*j/80); l=Math.floor(j/11);
  return{d,m:j+2-12*l,y:100*(n-49)+ii+l};
}
function fmtDate(d,m,y){return d+' '+GM[m-1]+' '+y+'م';}
function ramStyle(wd){
  if(wd==='الجمعة'||wd==='الأحد') return 'animation:ramBlink 1.2s ease-in-out infinite;font-weight:700;border-radius:6px;padding:2px 8px';
  if(wd) return 'background:rgba(102,187,106,.28);color:#a5d6a7;font-weight:700;border-radius:6px;padding:2px 8px';
  return '';
}
function dayAR(d,m,y){return GD[new Date(y,m-1,d).getDay()];}

async function apiConvert(hY,hM,hD){
  const dd=String(hD).padStart(2,'0'), mm=String(hM).padStart(2,'0');
  const url=`https://api.aladhan.com/v1/hToG?date=${dd}-${mm}-${hY}&calendarMethod=UMM_AL_QURA`;
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),8000);
  try{
    const res=await fetch(url,{signal:ctrl.signal});
    clearTimeout(timer);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(data.code!==200) throw new Error('API error');
    const g=data.data.gregorian;
    return{
      d:parseInt(g.day), m:parseInt(g.month.number), y:parseInt(g.year),
      wd:EN2AR[g.weekday.en]||dayAR(parseInt(g.day),parseInt(g.month.number),parseInt(g.year))
    };
  }catch(e){clearTimeout(timer);throw e;}
}

function localConvert(hY,hM,hD){
  // نحاول Intl.DateTimeFormat مع islamic-umalqura أولاً (أدق من المعادلة البسيطة)
  try {
    const approxG = h2g(hY,hM,hD);
    const approxDate = new Date(approxG.y, approxG.m-1, approxG.d);
    const fmt = new Intl.DateTimeFormat('en-u-ca-islamic-umalqura',
      {year:'numeric',month:'numeric',day:'numeric'});
    for(let offset=-3; offset<=3; offset++){
      const testDate = new Date(approxDate);
      testDate.setDate(testDate.getDate() + offset);
      const parts = fmt.formatToParts(testDate);
      const y2 = parseInt(parts.find(p=>p.type==='year').value);
      const m2 = parseInt(parts.find(p=>p.type==='month').value);
      const d2 = parseInt(parts.find(p=>p.type==='day').value);
      if(y2===hY && m2===hM && d2===hD){
        const gd=testDate.getDate(), gm=testDate.getMonth()+1, gy=testDate.getFullYear();
        return{d:gd,m:gm,y:gy,wd:dayAR(gd,gm,gy)};
      }
    }
  } catch(e){}
  // fallback للمعادلة البسيطة
  const g=h2g(hY,hM,hD);
  return{d:g.d,m:g.m,y:g.y,wd:dayAR(g.d,g.m,g.y)};
}

function findAltNights(hy, mainNum, mornWd, getSingleDate, targetMornWd){
  const odds = [21,23,25,27,29];
  const alts = [];
  // أولاً: نبحث عن فجر ثلاثاء
  for(const n of odds){
    if(n === mainNum) continue;
    const g = getSingleDate(hy, 9, n);
    if(g && g.wd === targetMornWd){
      const eve = getSingleDate(hy, 9, n-1);
      alts.push({num:n, morn:g, eve});
    }
  }
  if(alts.length) return alts;
  // ثانياً: إذا لم نجد، نأخذ أقرب وترية (أصغر فرق عن mainNum)
  let best = null, bestDiff = Infinity;
  for(const n of odds){
    if(n === mainNum) continue;
    const diff = Math.abs(n - mainNum);
    if(diff < bestDiff){ bestDiff=diff; best=n; }
  }
  if(best !== null){
    const g = getSingleDate(hy, 9, best);
    const eve = getSingleDate(hy, 9, best-1);
    return [{num:best, morn:g, eve}];
  }
  return null;
}

function findAltMonday(hy, mainNum, mornWd, getSingleDate){
  return findAltNights(hy, mainNum, mornWd, getSingleDate, 'الاثنين');
}

function shiftDate(d,m,y,days){
  const dt=new Date(y,m-1,d); dt.setDate(dt.getDate()+days);
  return{d:dt.getDate(),m:dt.getMonth()+1,y:dt.getFullYear(),wd:dayAR(dt.getDate(),dt.getMonth()+1,dt.getFullYear())};
}

  const idx=((hy-1430)%8+8)%8;

  let morn,eve,ramadanStart,src;

  // دالة مساعدة: تحسب المساء من الفجر - 1 يوم

  // دالة مساعدة: الكتاب للفجر
  function bookMorn(){ const [n,d,m,y]=BOOK[hy]; return{d,m,y,wd:dayAR(d,m,y)}; }
  // دالة مساعدة: الكتاب لـ 1 رمضان
  function bookRam(){ const [n,d,m,y]=BOOK[hy]; const dt=new Date(y,m-1,d); dt.setDate(dt.getDate()-(num-1)); return{d:dt.getDate(),m:dt.getMonth()+1,y:dt.getFullYear(),wd:dayAR(dt.getDate(),dt.getMonth()+1,dt.getFullYear())}; }

    res.style.display='block';

    try{
      // كل التواريخ من API
      [morn, ramadanStart] = await Promise.all([apiConvert(hy,9,num), apiConvert(hy,9,1)]);
      eve = eveFromMorn(morn);
      src = inBook?'api+book':'api';
    }catch(e){

  if(infoPat) infoPat.innerHTML = PATTERN.map((n,i)=>{ const yr=data.hy+(i-data.patternIdx); const active=i===data.patternIdx; return '<span style="'+(active?'color:#ffd54f;font-weight:700':'color:rgba(255,255,255,.45)')+'">'+n+'<sub style="font-size:9px;color:rgba(255,255,255,.3);margin-right:1px">'+yr+'</sub></span>'; }).join('<span style="color:rgba(255,255,255,.2)"> · </span>');
  const infoPatPrev = document.getElementById('info-pattern-prev');
  if(infoPatPrev && data.showPrev) infoPatPrev.textContent = 'ليلة ' + PATTERN[7];
  const summ = document.getElementById('summary-box');
  if(summ) summ.querySelector('p').innerHTML = data.summary;
}

document.getElementById('yearInput').addEventListener('input', () => {
  clearTimeout(window._calcTimer);
  window._calcTimer = setTimeout(calculate, 400);
});
document.getElementById('yearInput').value='1447';
calculate();
</script>

  window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});
}
</script>
